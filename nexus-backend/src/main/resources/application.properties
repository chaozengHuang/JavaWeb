# 服务器端口
server.port=8081

# MyBatis 相关配置（你原来的配置）
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.hcz.nexusbackend.mybatis.entity

# ========== 数据库连接配置 ==========
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/javaweb?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
spring.datasource.username=root
spring.datasource.password=root