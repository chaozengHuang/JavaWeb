# Nexus 论坛系统 Nginx 配置
# 将此文件内容合并到服务器 nginx.conf 的 server 块中，或放到 /etc/nginx/conf.d/nexus.conf

server {
    listen 80;
    server_name _;  # 替换为你的域名，如 example.com

    # 前端静态文件根目录（npm run build 生成的 dist 文件夹内容）
    root /path/to/nexus-frontend/dist;
    index index.html;

    # ========== 后端 API 代理 ==========
    # 所有以 /api/ 开头的请求转发到 Spring Boot 后端
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 帖子接口
    location /post {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 贴吧接口
    location /board {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 评论接口
    location /comment {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 管理后台接口
    location /admin {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 上传文件（图片、头像等静态资源）
    location /uploads/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
    }

    # WebSocket（私聊）
    location /ws/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ========== 前端 SPA 路由（Vue Router history 模式）==========
    # 所有非 API、非文件的请求都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
